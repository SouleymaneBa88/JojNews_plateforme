{% extends "base.html" %}

{% block content %}
<p>index</p>

<form  method="post">
    {% csrf_token %}
    {{form}}
    {% if form %}
        {% for field in form %}
            {{field.label}} {{label}}
        {% endfor %}
    {% else %}
        <p>pas de formulaire</p>
        {{form.error}}
    {% endif %}
    <button type="submit">Envoyer</button>
</form>

{% endblock  %}
