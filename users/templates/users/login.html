{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - JOJ Dakar</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url("{% static 'images/jojdakar.png' %}") no-repeat center center/cover;
            height: 100vh;
            margin: 0;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-control {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.3);
            box-shadow: none;
            color: white;
        }

        .btn-joj {
            background-color: #00853f;
            border: none;
        }

        .btn-joj:hover {
            background-color: #006c33;
        }

        a {
            color: #fcd116;
        }

        h2 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="glass-card text-center">

        <h2 class="mb-4">Connexion</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3 text-start">
                <label>Nom d'utilisateur</label>
                {{ form.username }}
            </div>

            <div class="mb-3 text-start">
                <label>Mot de passe</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-joj w-100 mt-3">
                Se connecter
            </button>
        </form>

        <p class="mt-3">
            Pas de compte ?
            <a href="{% url 'register' %}">S'inscrire</a>
        </p>

    </div>
</div>

</body>
</html>
