{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin JOJ Dakar</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        .container-fluid {
            height: 100vh;
        }

        /* LEFT SIDE */
        .login-side {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00853f, #fcd116, #ce1126);
            animation: gradientMove 8s infinite alternate;
        }

        @keyframes gradientMove {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* GLASS CARD */
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            color: white;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
        }

        /* INPUT */
        .form-control {
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
        }

        .form-control:focus {
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* BUTTON */
        .btn-joj {
            background: linear-gradient(45deg, #00853f, #fcd116, #ce1126);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-joj:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        /* RIGHT IMAGE */
        .image-side {
            background: url("{% static 'images/jojdakar.png' %}") center/contain no-repeat;
            background-color: black;
            animation: zoom 10s infinite alternate;
        }
        .form-group {
        position: relative;
        }

        .form-group label {
            transition: 0.3s;
        }

        .form-control:focus + label {
            transform: translateY(-5px);
        }

        @keyframes zoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .image-side {
                display: none;
            }
        }  
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row h-100">

        <!-- LEFT LOGIN -->
        <div class="col-md-5 login-side">
            <div class="login-box">

                <h2>Admin JOJ Dakar</h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="id_username">Nom d'utilisateur</label>
                        {{ form.username }}
                    </div>

                    <div class="form-group">
                        <label for="id_password">Mot de passe</label>
                        {{ form.password }}
                    </div>

                    <button type="submit" class="btn btn-joj w-100 mt-3">
                        Se connecter
                    </button>
                </form>

            </div>
        </div>

        <!-- RIGHT IMAGE -->
        <div class="col-md-7 image-side"></div>

    </div>
</div>

<!-- Script pour styliser les inputs Django -->
<script>
document.querySelectorAll("input").forEach(input => {
    input.classList.add("form-control");
});
</script>

</body>
</html>
